name: Build AutoClicker.dylib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    
    - name: Build dylib
      run: |
        cd AutoClicker
        make
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoClicker.dylib
        path: AutoClicker/AutoClicker.dylib
